<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guayana Dark Kitchen — Comida gourmet venezolana a domicilio en Puerto Ordaz. Hamburguesas, cachapas y más.">
  <title>Guayana Dark Kitchen | Sabor Gourmet a Domicilio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="logo">
    <a href="#inicio"><img src="assets/images/logo-guayana.jpg" alt="Guayana Dark Kitchen Logo"></a>
  </div>
  <nav id="nav-menu">
    <a href="#inicio" class="nav-link active">Inicio</a>
    <a href="#productos" class="nav-link">Productos</a>
    <a href="#beneficios" class="nav-link">Nosotros</a>
    <a href="#contacto" class="nav-link">Contacto</a>
  </nav>
  <div id="header-actions">
    <a id="header-whatsapp" target="_blank" class="btn btn-primary btn-sm">
      <ion-icon name="logo-whatsapp"></ion-icon> Pedir Ahora
    </a>
    <button id="menu-toggle" aria-label="Abrir Menú">
      <ion-icon name="menu-outline"></ion-icon>
    </button>
  </div>
</header>

<main>

  <section id="inicio" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content" id="hero-content"></div>
  </section>

  <section id="productos" class="products-section">
    <div class="container">
      <div class="section-header" id="menu-header"></div>
      <div class="category-filters" id="category-filters"></div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </section>

  <section id="beneficios" class="benefits-section">
    <div class="container">
      <div class="section-header" id="benefits-header"></div>
      <div class="benefits-grid" id="benefits-grid"></div>
    </div>
  </section>

  <section id="contacto" class="contact-section">
    <div class="container">
      <div class="contact-wrapper" id="contact-wrapper"></div>
    </div>
  </section>

</main>

<footer id="footer"></footer>

<button class="cart-fab" id="cart-fab" aria-label="Abrir carrito">
  <ion-icon name="bag-outline"></ion-icon>
  <span class="cart-badge" id="cart-badge">0</span>
</button>

<div class="cart-overlay" id="cart-overlay"></div>

<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h3>Tu Pedido</h3>
    <button class="cart-close" id="cart-close" aria-label="Cerrar carrito">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer"></div>
</div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script src="script.js"></script>
</body>
</html>
